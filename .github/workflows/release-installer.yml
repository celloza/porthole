name: Release Installer

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.1.0)"
        required: true
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-installer-${{ github.event.release.tag_name || github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag commit is on main
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ inputs.tag }}" }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "Tag is required for release validation."
            exit 1
          }

          git fetch origin +refs/heads/main:refs/remotes/origin/main --tags --force

          $targetSha = (git rev-list -n 1 $tag)
          if ([string]::IsNullOrWhiteSpace($targetSha)) {
            Write-Error "Unable to resolve tag '$tag' to a commit SHA."
            exit 1
          }

          # `git merge-base --is-ancestor` signals via exit code and prints no stdout,
          # so rely on $LASTEXITCODE instead of PowerShell boolean coercion.
          git merge-base --is-ancestor $targetSha origin/main
          if ($LASTEXITCODE -ne 0) {
            Write-Error "The release tag commit is not contained in origin/main. Tag from main to release."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
            $version = $tag.TrimStart("v")
            $isPrerelease = "${{ github.event.release.prerelease }}" -eq "true"
          }
          else {
            $tag = "${{ inputs.tag }}"
            $version = "${{ inputs.version }}"
            $isPrerelease = "${{ inputs.prerelease }}" -eq "true"
          }

          if ([string]::IsNullOrWhiteSpace($tag) -or [string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Tag and version must be provided."
            exit 1
          }

          # MSI ProductVersion must be numeric (major.minor.build).
          # Allow semver prerelease tags (for example v1.2.3-rc.1) while keeping
          # the package file name tied to the full tag string.
          if ($version -match '^(\d+\.\d+\.\d+)(?:-[0-9A-Za-z.-]+)?$') {
            $msiVersion = $matches[1]
          }
          else {
            Write-Error "Version '$version' is not a supported semver format. Use tags like v1.2.3 or v1.2.3-rc.1."
            exit 1
          }

          $packageBaseName = "Porthole-$tag-x64"

          # Auto-detect semver prerelease tags like v1.2.3-rc.1, v1.2.3-beta.2, v1.2.3-alpha
          if ($tag -match '^v\d+\.\d+\.\d+-[0-9A-Za-z.-]+$') {
            $isPrerelease = $true
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msi_version=$msiVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "package_base_name=$packageBaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build MSI
        shell: pwsh
        run: |
          dotnet build src/Porthole.Installer/Porthole.Installer.wixproj -c Release -p:ProductVersion=${{ steps.meta.outputs.msi_version }} -p:OutputName=${{ steps.meta.outputs.package_base_name }} -p:Platform=x64

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $packageBaseName = "${{ steps.meta.outputs.package_base_name }}"
          $msi = "src/Porthole.Installer/bin/x64/Release/$packageBaseName.msi"

          if (-not (Test-Path -LiteralPath $msi)) {
            Write-Error "MSI not found: $msi"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath $msi -Destination dist

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path dist (Split-Path $msi -Leaf))
          "$($hash.Hash)  $($hash.Path | Split-Path -Leaf)" | Set-Content -LiteralPath (Join-Path dist "sha256.txt")

          "msi=$(Resolve-Path -LiteralPath (Join-Path dist (Split-Path $msi -Leaf)))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: porthole-installer-${{ steps.meta.outputs.version }}
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.msi
            dist/sha256.txt

  winget-manifest:
    runs-on: windows-latest
    needs: build-and-release

    permissions:
      contents: read

    env:
      WINGETCREATE_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve WinGet inputs
        id: winget
        shell: pwsh
        run: |
          $version = "${{ needs.build-and-release.outputs.version }}"
          $tag = "${{ needs.build-and-release.outputs.tag }}"
          $manifestPath = Join-Path $env:RUNNER_TEMP "winget-manifests/$version"
          $installerUrl = "https://github.com/celloza/porthole/releases/download/$tag/Porthole-$tag-x64.msi"

          New-Item -ItemType Directory -Force -Path $manifestPath | Out-Null

          "path=$manifestPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_url=$installerUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate WinGet manifest
        shell: pwsh
        run: |
          Import-Module Appx -UseWindowsPowerShell -ErrorAction Stop

          $appxBundleFile = Join-Path -Path $env:TEMP -ChildPath "wingetcreate.msixbundle"
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest/msixbundle" -OutFile $appxBundleFile -ErrorAction Stop
          Add-AppxPackage -Path $appxBundleFile -ErrorAction Stop

          wingetcreate new --out "${{ steps.winget.outputs.path }}" --no-open "${{ steps.winget.outputs.installer_url }}"

          winget validate --manifest "${{ steps.winget.outputs.path }}"

      - name: Submit WinGet manifest
        if: ${{ env.WINGETCREATE_TOKEN != '' }}
        shell: pwsh
        run: |
          $version = "${{ needs.build-and-release.outputs.version }}"
          wingetcreate submit --prtitle "Add celloza.Porthole version $version" --token $env:WINGETCREATE_TOKEN --no-open "${{ steps.winget.outputs.path }}"

      - name: Skip WinGet submission
        if: ${{ env.WINGETCREATE_TOKEN == '' }}
        shell: pwsh
        run: |
          Write-Host "WINGETCREATE_TOKEN is not configured. Generated manifest validation succeeded; skipping submission."
