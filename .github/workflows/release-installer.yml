name: Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.1.0)"
        required: true
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-installer-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag commit is on main
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "push") { "${{ github.ref_name }}" } else { "${{ inputs.tag }}" }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "Tag is required for release validation."
            exit 1
          }

          git fetch origin main
          git fetch --tags origin

          $targetSha = (git rev-list -n 1 $tag)
          if ([string]::IsNullOrWhiteSpace($targetSha)) {
            Write-Error "Unable to resolve tag '$tag' to a commit SHA."
            exit 1
          }

          if (-not (git merge-base --is-ancestor $targetSha origin/main)) {
            Write-Error "The release tag commit is not contained in origin/main. Tag from main to release."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart("v")
            $isPrerelease = $false
          }
          else {
            $tag = "${{ inputs.tag }}"
            $version = "${{ inputs.version }}"
            $isPrerelease = "${{ inputs.prerelease }}" -eq "true"
          }

          if ([string]::IsNullOrWhiteSpace($tag) -or [string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Tag and version must be provided."
            exit 1
          }

          # Auto-detect semver prerelease tags like v1.2.3-rc.1, v1.2.3-beta.2, v1.2.3-alpha
          if ($tag -match '^v\d+\.\d+\.\d+-[0-9A-Za-z.-]+$') {
            $isPrerelease = $true
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build MSI
        shell: pwsh
        run: |
          dotnet build src/Porthole.Installer/Porthole.Installer.wixproj -c Release -p:ProductVersion=${{ steps.meta.outputs.version }} -p:Platform=x64

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $msi = "src/Porthole.Installer/bin/x64/Release/Porthole-$version-x64.msi"

          if (-not (Test-Path -LiteralPath $msi)) {
            Write-Error "MSI not found: $msi"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath $msi -Destination dist

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path dist (Split-Path $msi -Leaf))
          "$($hash.Hash)  $($hash.Path | Split-Path -Leaf)" | Set-Content -LiteralPath (Join-Path dist "sha256.txt")

          "msi=$(Resolve-Path -LiteralPath (Join-Path dist (Split-Path $msi -Leaf)))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: porthole-installer-${{ steps.meta.outputs.version }}
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.msi
            dist/sha256.txt
