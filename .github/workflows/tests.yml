name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Porthole.slnx

      - name: Test
        run: dotnet test tests/Porthole.Core.Tests/Porthole.Core.Tests.csproj -c Release --no-restore --verbosity normal